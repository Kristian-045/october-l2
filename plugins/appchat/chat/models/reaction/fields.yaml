# ===================================
#  Form Field Definitions
# ===================================

fields:
    emoji:
        label: Emoji
        type: dropdown
        options: getEmojiOptions
        required: true

    message:
        label: Message
        type: relation
        nameFrom: message
        required: true
        dependsOn: message
        modelScope: inConversation

    user:
        label: User
        type: relation
        nameFrom: name
        required: true
        dependsOn: message
        modelScope: inConversation
